name: Deploy CMS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/cms/**'
      - 'Dockerfile.cms'
      - 'scripts/aws/deploy-cms.sh'
      - 'scripts/aws/run-cms-migrations.sh'
      - '.github/workflows/deploy-cms.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cms:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
      ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
      ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_CMS }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and push image
        run: bash scripts/aws/deploy-cms.sh

      - name: Run migrations
        run: bash scripts/aws/run-cms-migrations.sh
