<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" style="max-width: 300px; display: block; margin: 0 auto; cursor: pointer; font-family: sans-serif;" onclick="this.classList.toggle('active')">
    <defs>
        <style>
            .line {
            fill: transparent;
            stroke: #1a1a1a;
            stroke-width: 2.25;
            stroke-linecap: round;
            transition: fill 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .active .line {
            fill: #FFB6C1;
            }
        </style>
    </defs>

    <!-- Invisible clickable area covering the entire icon -->
    <rect x="0" y="0" width="100" height="100" fill="transparent" />

    <g class="icon">
        <!-- Top Line -->
        <rect x="20" y="28" width="60" height="10" rx="5" class="line line-top" />

        <!-- Middle Line -->
        <rect x="20" y="45" width="60" height="10" rx="5" class="line line-mid" />

        <!-- Bottom Line -->
        <rect x="20" y="62" width="60" height="10" rx="5" class="line line-bot" />
    </g>
</svg>
